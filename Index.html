<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Tool for Bot Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e4e4e7;
            font-family: system-ui, sans-serif;
            padding: 1rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: #111114;
            border: 1px solid #27272a;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        textarea {
            width: 100%;
            background: #1f1f24;
            border: 1px solid #3f3f46;
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: white;
            font-family: monospace;
            font-size: 0.8rem;
            margin: 1rem 0;
        }
        textarea:focus {
            outline: none;
            border-color: #8b5cf6;
        }
        button {
            background: #8b5cf6;
            border: none;
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 0.5rem;
        }
        button:hover { background: #7c3aed; }
        button.secondary {
            background: #3f3f46;
        }
        button.secondary:hover { background: #52525b; }
        pre {
            background: #0c0c0e;
            border: 1px solid #27272a;
            border-radius: 0.5rem;
            padding: 1rem;
            font-size: 0.75rem;
            white-space: pre-wrap;
            font-family: monospace;
            max-height: 300px;
            overflow-y: auto;
        }
        .success { color: #4ade80; margin-top: 0.5rem; }
        .error { color: #f87171; margin-top: 0.5rem; }
        .info { color: #a78bfa; margin-top: 0.5rem; }
        .small { font-size: 0.7rem; color: #71717a; }
        .example {
            background: #1f1f24;
            border-radius: 0.25rem;
            padding: 0.25rem 0.5rem;
            font-size: 0.7rem;
            color: #a78bfa;
            cursor: pointer;
            display: inline-block;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .example:hover { background: #2f2f34; }
        .flex { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📋 Bot Agent JSON Tool</h1>
        <div class="small" style="margin-bottom: 1rem;">Paste JSON from Claude → Copy to your bot</div>
        
        <div class="flex">
            <button id="pasteExampleBtn" class="secondary">📝 Paste Example JSON</button>
            <button id="clearBtn" class="secondary">🗑️ Clear All</button>
        </div>
        
        <label>📋 Step 1: Paste JSON here (from Claude)</label>
        <textarea id="jsonInput" rows="6" placeholder='Paste the JSON that Claude gives you here...'></textarea>
        
        <button id="copyBtn">📋 Step 2: Copy JSON to Clipboard</button>
        
        <div id="status" class="info"></div>
    </div>
    
    <div class="card">
        <label>✅ Step 3: This is what your bot gets:</label>
        <pre id="output">Waiting for JSON...</pre>
        <div class="small" style="margin-top: 0.5rem;">Click "Copy" above, then paste into your bot agent.</div>
    </div>
</div>

<script>
    const jsonInput = document.getElementById('jsonInput');
    const copyBtn = document.getElementById('copyBtn');
    const pasteExampleBtn = document.getElementById('pasteExampleBtn');
    const clearBtn = document.getElementById('clearBtn');
    const outputPre = document.getElementById('output');
    const statusDiv = document.getElementById('status');
    
    // Example JSON for Monkey Adventures
    const exampleJSON = `{
  "business_name": "Monkey Adventures Tanzania",
  "website": "monkey.travel",
  "email": "info@monkeyadventures.com",
  "phone": "+255 782 476 591",
  "address": "Arusha, Tanzania",
  "services": [
    "Safari tours",
    "Kilimanjaro trekking",
    "Zanzibar beach holidays"
  ],
  "pricing": {
    "3_day_safari": "$870 per person",
    "5_day_safari": "$950 per person",
    "kilimanjaro_6_day": "$1,150 per person"
  },
  "hours": "24/7 customer support",
  "years_in_business": "Since 2015"
}`;
    
    // Paste example
    pasteExampleBtn.onclick = () => {
        jsonInput.value = exampleJSON;
        formatAndDisplay();
        statusDiv.innerHTML = '✅ Example JSON loaded! Click "Copy" to use in your bot.';
        statusDiv.className = 'success';
    };
    
    // Clear all
    clearBtn.onclick = () => {
        jsonInput.value = '';
        outputPre.innerText = 'Waiting for JSON...';
        statusDiv.innerHTML = 'Cleared. Paste your JSON here.';
        statusDiv.className = 'info';
    };
    
    // Format and display JSON
    function formatAndDisplay() {
        let text = jsonInput.value.trim();
        if (text) {
            try {
                const parsed = JSON.parse(text);
                const formatted = JSON.stringify(parsed, null, 2);
                outputPre.innerText = formatted;
                statusDiv.innerHTML = '✅ Valid JSON! Ready to copy.';
                statusDiv.className = 'success';
            } catch(e) {
                outputPre.innerText = text;
                statusDiv.innerHTML = '⚠️ Not valid JSON, but will copy as text.';
                statusDiv.className = 'error';
            }
        } else {
            outputPre.innerText = 'Waiting for JSON...';
            statusDiv.innerHTML = 'Paste JSON from Claude above...';
            statusDiv.className = 'info';
        }
    }
    
    // Live update when typing/pasting
    jsonInput.addEventListener('input', formatAndDisplay);
    
    // Copy button
    copyBtn.onclick = async () => {
        const text = outputPre.innerText;
        if (text && text !== 'Waiting for JSON...') {
            await navigator.clipboard.writeText(text);
            copyBtn.innerHTML = '✅ Copied! Paste into your bot now.';
            statusDiv.innerHTML = '✅ JSON copied! Go paste into your bot agent.';
            statusDiv.className = 'success';
            setTimeout(() => copyBtn.innerHTML = '📋 Step 2: Copy JSON to Clipboard', 3000);
        } else {
            statusDiv.innerHTML = '❌ Nothing to copy. First paste some JSON above.';
            statusDiv.className = 'error';
        }
    };
    
    // Instructions
    statusDiv.innerHTML = '💡 Click "Paste Example JSON" to see how it works, or paste your own JSON from Claude.';
</script>
</body>
</html>
