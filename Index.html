<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Copier · For Your Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e4e4e7;
            font-family: system-ui, sans-serif;
            padding: 1rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: #111114;
            border: 1px solid #27272a;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        textarea {
            width: 100%;
            background: #1f1f24;
            border: 1px solid #3f3f46;
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: white;
            font-family: monospace;
            font-size: 0.8rem;
            margin: 1rem 0;
        }
        button {
            background: #8b5cf6;
            border: none;
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #7c3aed; }
        pre {
            background: #0c0c0e;
            border: 1px solid #27272a;
            border-radius: 0.5rem;
            padding: 1rem;
            font-size: 0.75rem;
            white-space: pre-wrap;
        }
        .success { color: #4ade80; margin-top: 0.5rem; }
        .small { font-size: 0.7rem; color: #71717a; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📋 JSON for Your Bot Agent</h1>
        <p style="color: #a1a1aa; margin-bottom: 1rem;">Paste JSON → Copy → Give to your bot</p>
        
        <label>1️⃣ Ask Claude for a company:</label>
        <div style="background: #1f1f24; padding: 0.5rem; border-radius: 0.5rem; margin-bottom: 1rem;">
            <code style="color: #a78bfa;">"Research [COMPANY NAME] and give me JSON for my bot"</code>
        </div>
        
        <label>2️⃣ Paste the JSON here:</label>
        <textarea id="jsonInput" rows="6" placeholder='{"business_name": "Example", "email": "example@email.com"}'></textarea>
        
        <button id="copyBtn">📋 Copy JSON to Clipboard</button>
        <div id="status" class="small" style="margin-top: 0.5rem;"></div>
    </div>
    
    <div class="card">
        <label>✅ Formatted JSON (ready for your bot):</label>
        <pre id="output">Waiting for JSON...</pre>
    </div>
</div>

<script>
    const jsonInput = document.getElementById('jsonInput');
    const copyBtn = document.getElementById('copyBtn');
    const outputPre = document.getElementById('output');
    const statusDiv = document.getElementById('status');
    
    jsonInput.addEventListener('input', function() {
        let text = jsonInput.value.trim();
        if (text) {
            try {
                const parsed = JSON.parse(text);
                const formatted = JSON.stringify(parsed, null, 2);
                outputPre.innerText = formatted;
                statusDiv.innerHTML = '✅ Valid JSON! Ready to copy.';
                statusDiv.style.color = '#4ade80';
            } catch(e) {
                outputPre.innerText = text;
                statusDiv.innerHTML = '⚠️ Not valid JSON, but will copy as is.';
                statusDiv.style.color = '#f87171';
            }
        } else {
            outputPre.innerText = 'Waiting for JSON...';
            statusDiv.innerHTML = '';
        }
    });
    
    copyBtn.onclick = async () => {
        const text = outputPre.innerText;
        if (text && text !== 'Waiting for JSON...') {
            await navigator.clipboard.writeText(text);
            copyBtn.innerHTML = '✅ Copied!';
            statusDiv.innerHTML = '✅ JSON copied! Paste into your bot agent.';
            statusDiv.style.color = '#4ade80';
            setTimeout(() => copyBtn.innerHTML = '📋 Copy JSON to Clipboard', 2000);
        } else {
            statusDiv.innerHTML = '❌ Paste some JSON first.';
            statusDiv.style.color = '#f87171';
        }
    };
</script>
</body>
</html>
