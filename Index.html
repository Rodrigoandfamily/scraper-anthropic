<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrape.do + Claude · Anti-Bot Scraper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e4e4e7;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 1rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: #111114;
            border: 1px solid #27272a;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #a1a1aa;
        }
        input, textarea {
            width: 100%;
            background: #1f1f24;
            border: 1px solid #3f3f46;
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: white;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #8b5cf6;
        }
        button {
            background: #8b5cf6;
            border: none;
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 0.5rem;
        }
        button:hover { background: #7c3aed; }
        button.secondary {
            background: #3f3f46;
            width: auto;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }
        pre {
            background: #0c0c0e;
            border: 1px solid #27272a;
            border-radius: 0.5rem;
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.7rem;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .flex { display: flex; gap: 0.5rem; justify-content: flex-end; margin-bottom: 0.5rem; }
        .status {
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }
        .error { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #f87171; }
        .success { background: rgba(34,197,94,0.1); border: 1px solid #22c55e; color: #4ade80; }
        .info { background: rgba(139,92,246,0.1); border: 1px solid #8b5cf6; }
        .small { font-size: 0.7rem; color: #71717a; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🔒 Anti-Bot Web Scraper</h1>
        <div class="small" style="margin-bottom: 1rem;">Uses Scrape.do to bypass Cloudflare · Extracts data with Claude</div>
        
        <label>🔑 Scrape.do API Token</label>
        <input type="password" id="scrapeToken" placeholder="Get token from dashboard.scrape.do">
        
        <label>🔑 Anthropic API Key</label>
        <input type="password" id="claudeToken" placeholder="sk-ant-api-...">
        
        <label>🌐 Target URL</label>
        <input type="text" id="targetUrl" placeholder="https://www.monkey-adventure.com/" value="https://www.monkey-adventure.com/">
        
        <label>📋 Extraction Instructions</label>
        <textarea id="instructions" rows="4">Extract: business name, email, phone, address, hours, services, pricing, FAQs, guarantees. Return as JSON.</textarea>
        
        <button id="scrapeBtn">🚀 Bypass & Extract</button>
        
        <div id="status" class="status info">Ready. Enter Scrape.do token and URL.</div>
    </div>
    
    <div class="card">
        <div class="flex">
            <button id="copyBtn" class="secondary">📋 Copy JSON</button>
            <button id="clearBtn" class="secondary">🗑️ Clear</button>
        </div>
        <pre id="output">{
  "status": "waiting",
  "message": "Click 'Bypass & Extract' to scrape any website"
}</pre>
    </div>
</div>

<script>
    const scrapeToken = document.getElementById('scrapeToken');
    const claudeToken = document.getElementById('claudeToken');
    const targetUrl = document.getElementById('targetUrl');
    const instructions = document.getElementById('instructions');
    const scrapeBtn = document.getElementById('scrapeBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusDiv = document.getElementById('status');
    const outputPre = document.getElementById('output');
    
    // Load saved tokens
    const savedScrapeToken = localStorage.getItem('scrape_do_token');
    const savedClaudeToken = localStorage.getItem('anthropic_key');
    if (savedScrapeToken) { scrapeToken.value = savedScrapeToken; }
    if (savedClaudeToken) { claudeToken.value = savedClaudeToken; }
    
    // Save tokens
    scrapeToken.addEventListener('change', () => {
        if (scrapeToken.value.trim()) {
            localStorage.setItem('scrape_do_token', scrapeToken.value.trim());
        }
    });
    claudeToken.addEventListener('change', () => {
        if (claudeToken.value.trim()) {
            localStorage.setItem('anthropic_key', claudeToken.value.trim());
        }
    });
    
    copyBtn.onclick = async () => {
        const text = outputPre.innerText;
        if (text && !text.includes('"status": "waiting"')) {
            await navigator.clipboard.writeText(text);
            copyBtn.innerHTML = '✅ Copied!';
            setTimeout(() => copyBtn.innerHTML = '📋 Copy JSON', 2000);
            statusDiv.innerHTML = '✅ JSON copied for your bot!';
            statusDiv.className = 'status success';
        }
    };
    
    clearBtn.onclick = () => {
        outputPre.innerText = '{}';
        statusDiv.innerHTML = 'Cleared. Ready for new scrape.';
        statusDiv.className = 'status info';
    };
    
    scrapeBtn.onclick = async () => {
        const scrapeApiToken = scrapeToken.value.trim();
        const anthropicApiKey = claudeToken.value.trim();
        const url = targetUrl.value.trim();
        const extractInstructions = instructions.value.trim();
        
        if (!scrapeApiToken) {
            statusDiv.innerHTML = '❌ Enter your Scrape.do API token first. Get it from dashboard.scrape.do';
            statusDiv.className = 'status error';
            return;
        }
        
        if (!url) {
            statusDiv.innerHTML = '❌ Enter a URL to scrape.';
            statusDiv.className = 'status error';
            return;
        }
        
        statusDiv.innerHTML = '🌐 Step 1: Bypassing Cloudflare via Scrape.do...';
        statusDiv.className = 'status info';
        outputPre.innerText = '{"status": "bypassing", "message": "Fetching website through Scrape.do..."}';
        
        try {
            // Step 1: Use Scrape.do to get HTML content
            const encodedUrl = encodeURIComponent(url);
            const scrapeApiUrl = `https://api.scrape.do/?token=${scrapeApiToken}&url=${encodedUrl}&render=true`;
            
            const scrapeResponse = await fetch(scrapeApiUrl);
            if (!scrapeResponse.ok) throw new Error(`Scrape.do API error: ${scrapeResponse.status}`);
            
            let html = await scrapeResponse.text();
            if (html.length > 60000) html = html.substring(0, 60000);
            
            statusDiv.innerHTML = '🤖 Step 2: Extracting data with Claude...';
            outputPre.innerText = '{"status": "extracting", "message": "Claude is analyzing the content..."}';
            
            // Step 2: Send to Claude for extraction (if API key provided)
            if (anthropicApiKey && anthropicApiKey.startsWith('sk-ant-')) {
                const claudePrompt = `You are a business data extractor. Extract from this HTML content:\n\n${html}\n\n${extractInstructions}\n\nReturn ONLY valid JSON, no other text.`;
                
                const claudeResponse = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'x-api-key': anthropicApiKey,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'claude-3-sonnet-20241022',
                        max_tokens: 4000,
                        system: 'Extract business data. Return ONLY valid JSON.',
                        messages: [{ role: 'user', content: claudePrompt }]
                    })
                });
                
                if (claudeResponse.ok) {
                    const claudeData = await claudeResponse.json();
                    let result = claudeData.content[0].text;
                    const jsonMatch = result.match(/```json\s*([\s\S]*?)\s*```/);
                    if (jsonMatch) result = jsonMatch[1];
                    try { result = JSON.stringify(JSON.parse(result), null, 2); } catch(e) {}
                    outputPre.innerText = result;
                    statusDiv.innerHTML = '✅ Extraction complete! Copy JSON for your bot.';
                    statusDiv.className = 'status success';
                } else {
                    // Show raw HTML if Claude fails
                    outputPre.innerText = html.substring(0, 3000);
                    statusDiv.innerHTML = '⚠️ Claude extraction failed. Showing raw HTML (first 3000 chars).';
                    statusDiv.className = 'status error';
                }
            } else {
                // No Claude API key - show raw HTML
                outputPre.innerText = html.substring(0, 3000);
                statusDiv.innerHTML = '⚠️ No Anthropic API key. Showing raw HTML (first 3000 chars). Add a key for structured data.';
                statusDiv.className = 'status info';
            }
            
        } catch (error) {
            statusDiv.innerHTML = `❌ Error: ${error.message}`;
            statusDiv.className = 'status error';
            outputPre.innerText = `{"error": "${error.message}"}`;
        }
    };
</script>
</body>
</html>
