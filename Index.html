<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrape.do + Claude · Anti-Bot Scraper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e4e4e7;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 1rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: #111114;
            border: 1px solid #27272a;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #a1a1aa;
        }
        input, textarea {
            width: 100%;
            background: #1f1f24;
            border: 1px solid #3f3f46;
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: white;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #8b5cf6;
        }
        button {
            background: #8b5cf6;
            border: none;
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 0.5rem;
        }
        button:hover { background: #7c3aed; }
        button.secondary {
            background: #3f3f46;
            width: auto;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }
        pre {
            background: #0c0c0e;
            border: 1px solid #27272a;
            border-radius: 0.5rem;
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.7rem;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .flex { display: flex; gap: 0.5rem; justify-content: flex-end; margin-bottom: 0.5rem; }
        .status {
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }
        .error { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #f87171; }
        .success { background: rgba(34,197,94,0.1); border: 1px solid #22c55e; color: #4ade80; }
        .info { background: rgba(139,92,246,0.1); border: 1px solid #8b5cf6; }
        .warning { background: rgba(234,179,8,0.1); border: 1px solid #eab308; color: #fde047; }
        .small { font-size: 0.7rem; color: #71717a; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🔒 Anti-Bot Web Scraper</h1>
        <div class="small" style="margin-bottom: 1rem;">Uses Scrape.do to bypass Cloudflare · Auto-retry on 502 errors</div>
        
        <label>🔑 Scrape.do API Token</label>
        <input type="password" id="scrapeToken" placeholder="Get token from dashboard.scrape.do">
        
        <label>🔑 Anthropic API Key (Optional)</label>
        <input type="password" id="claudeToken" placeholder="sk-ant-api-... (optional)">
        
        <label>🌐 Target URL</label>
        <input type="text" id="targetUrl" placeholder="https://www.monkey-adventure.com/" value="https://www.monkey-adventure.com/">
        
        <div style="margin-bottom: 1rem;">
            <label style="display: inline-flex; align-items: center; gap: 0.5rem; margin-right: 1rem;">
                <input type="radio" name="renderMode" value="true" checked> Render JS (render=true)
            </label>
            <label style="display: inline-flex; align-items: center; gap: 0.5rem;">
                <input type="radio" name="renderMode" value="false"> Basic (render=false)
            </label>
        </div>
        
        <label>📋 Extraction Instructions</label>
        <textarea id="instructions" rows="4">Extract: business name, email, phone, address, hours, services, pricing, FAQs, guarantees. Return as JSON.</textarea>
        
        <button id="scrapeBtn">🚀 Bypass & Extract (Auto-Retry)</button>
        
        <div id="status" class="status info">Ready. Enter Scrape.do token and URL.</div>
    </div>
    
    <div class="card">
        <div class="flex">
            <button id="copyBtn" class="secondary">📋 Copy JSON</button>
            <button id="clearBtn" class="secondary">🗑️ Clear</button>
        </div>
        <pre id="output">{
  "status": "waiting",
  "message": "Click 'Bypass & Extract' to scrape any website"
}</pre>
    </div>
</div>

<script>
    const scrapeToken = document.getElementById('scrapeToken');
    const claudeToken = document.getElementById('claudeToken');
    const targetUrl = document.getElementById('targetUrl');
    const instructions = document.getElementById('instructions');
    const scrapeBtn = document.getElementById('scrapeBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusDiv = document.getElementById('status');
    const outputPre = document.getElementById('output');
    const renderRadios = document.querySelectorAll('input[name="renderMode"]');
    
    // Load saved tokens
    const savedScrapeToken = localStorage.getItem('scrape_do_token');
    const savedClaudeToken = localStorage.getItem('anthropic_key');
    if (savedScrapeToken) { scrapeToken.value = savedScrapeToken; }
    if (savedClaudeToken) { claudeToken.value = savedClaudeToken; }
    
    // Save tokens
    scrapeToken.addEventListener('change', () => {
        if (scrapeToken.value.trim()) {
            localStorage.setItem('scrape_do_token', scrapeToken.value.trim());
        }
    });
    claudeToken.addEventListener('change', () => {
        if (claudeToken.value.trim()) {
            localStorage.setItem('anthropic_key', claudeToken.value.trim());
        }
    });
    
    copyBtn.onclick = async () => {
        const text = outputPre.innerText;
        if (text && !text.includes('"status": "waiting"')) {
            await navigator.clipboard.writeText(text);
            copyBtn.innerHTML = '✅ Copied!';
            setTimeout(() => copyBtn.innerHTML = '📋 Copy JSON', 2000);
            statusDiv.innerHTML = '✅ JSON copied for your bot!';
            statusDiv.className = 'status success';
        }
    };
    
    clearBtn.onclick = () => {
        outputPre.innerText = '{}';
        statusDiv.innerHTML = 'Cleared. Ready for new scrape.';
        statusDiv.className = 'status info';
    };
    
    async function scrapeWithRetry(token, url, render, maxRetries = 3) {
        for (let attempt = 1; attempt <= maxRetries; attempt++) {
            statusDiv.innerHTML = `🌐 Attempt ${attempt}/${maxRetries}: Bypassing Cloudflare via Scrape.do...`;
            
            const encodedUrl = encodeURIComponent(url);
            const apiUrl = `http://api.scrape.do/?token=${token}&url=${encodedUrl}&render=${render}`;
            
            try {
                const response = await fetch(apiUrl);
                
                if (response.status === 502) {
                    statusDiv.innerHTML = `⚠️ Attempt ${attempt}: Got 502 error. Retrying in 2 seconds... (Credit not charged)`;
                    statusDiv.className = 'status warning';
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    continue;
                }
                
                if (!response.ok) {
                    throw new Error(`Scrape.do API error: ${response.status}`);
                }
                
                const html = await response.text();
                return { success: true, html: html.substring(0, 60000), attempt };
                
            } catch (error) {
                if (attempt === maxRetries) {
                    return { success: false, error: error.message };
                }
                await new Promise(resolve => setTimeout(resolve, 2000));
            }
        }
        return { success: false, error: 'Max retries exceeded' };
    }
    
    scrapeBtn.onclick = async () => {
        const scrapeApiToken = scrapeToken.value.trim();
        const anthropicApiKey = claudeToken.value.trim();
        const url = targetUrl.value.trim();
        const extractInstructions = instructions.value.trim();
        const renderMode = document.querySelector('input[name="renderMode"]:checked').value;
        
        if (!scrapeApiToken) {
            statusDiv.innerHTML = '❌ Enter your Scrape.do API token first. Get it from dashboard.scrape.do';
            statusDiv.className = 'status error';
            return;
        }
        
        if (!url) {
            statusDiv.innerHTML = '❌ Enter a URL to scrape.';
            statusDiv.className = 'status error';
            return;
        }
        
        outputPre.innerText = '{"status": "bypassing", "message": "Fetching website through Scrape.do..."}';
        
        const result = await scrapeWithRetry(scrapeApiToken, url, renderMode, 3);
        
        if (!result.success) {
            statusDiv.innerHTML = `❌ Failed after 3 attempts: ${result.error}. Try different render mode or check URL.`;
            statusDiv.className = 'status error';
            outputPre.innerText = `{"error": "${result.error}"}`;
            return;
        }
        
        statusDiv.innerHTML = `✅ Got HTML on attempt ${result.attempt}! Now processing...`;
        
        // Show raw HTML preview
        if (!anthropicApiKey || !anthropicApiKey.startsWith('sk-ant-')) {
            outputPre.innerText = result.html.substring(0, 3000);
            statusDiv.innerHTML = `✅ HTML fetched (${result.html.length} chars). Add Anthropic API key for structured JSON.`;
            statusDiv.className = 'status success';
            return;
        }
        
        // Send to Claude
        statusDiv.innerHTML = '🤖 Extracting data with Claude...';
        
        try {
            const claudePrompt = `Extract from this HTML:\n\n${result.html}\n\n${extractInstructions}\n\nReturn ONLY valid JSON.`;
            
            const claudeResponse = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'x-api-key': anthropicApiKey,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'claude-3-sonnet-20241022',
                    max_tokens: 4000,
                    system: 'Extract business data. Return ONLY valid JSON.',
                    messages: [{ role: 'user', content: claudePrompt }]
                })
            });
            
            if (claudeResponse.ok) {
                const claudeData = await claudeResponse.json();
                let resultText = claudeData.content[0].text;
                const jsonMatch = resultText.match(/```json\s*([\s\S]*?)\s*```/);
                if (jsonMatch) resultText = jsonMatch[1];
                try { resultText = JSON.stringify(JSON.parse(resultText), null, 2); } catch(e) {}
                outputPre.innerText = resultText;
                statusDiv.innerHTML = '✅ Extraction complete! Copy JSON for your bot.';
                statusDiv.className = 'status success';
            } else {
                throw new Error('Claude API error');
            }
        } catch (error) {
            outputPre.innerText = result.html.substring(0, 3000);
            statusDiv.innerHTML = `⚠️ Claude failed. Showing raw HTML (${result.html.length} chars).`;
            statusDiv.className = 'status warning';
        }
    };
</script>
</body>
</html>
