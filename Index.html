<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Info Extractor · For Your Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e4e4e7;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 1rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: #111114;
            border: 1px solid #27272a;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        input, textarea {
            width: 100%;
            background: #1f1f24;
            border: 1px solid #3f3f46;
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: white;
            margin-bottom: 1rem;
        }
        button {
            background: #8b5cf6;
            border: none;
            border-radius: 0.5rem;
            padding: 0.75rem 1.5rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #7c3aed; }
        pre {
            background: #0c0c0e;
            border: 1px solid #27272a;
            border-radius: 0.5rem;
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.75rem;
            white-space: pre-wrap;
        }
        .status {
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }
        .error { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #f87171; }
        .success { background: rgba(34,197,94,0.1); border: 1px solid #22c55e; color: #4ade80; }
        .info { background: rgba(139,92,246,0.1); border: 1px solid #8b5cf6; }
        .small { font-size: 0.7rem; color: #71717a; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🔍 Business Info Extractor</h1>
        <p style="color: #a1a1aa; margin-bottom: 1rem;">Get contact info, pricing, services - works for ANY business</p>
        
        <label>🔑 Anthropic API Key</label>
        <input type="password" id="apiKey" placeholder="sk-ant-api-...">
        
        <label>🏢 Business Name & Details</label>
        <textarea id="businessQuery" rows="3" placeholder="Example: Monkey Adventures Tanzania, safari tour company in Arusha. I need their email, phone, pricing, and services."></textarea>
        
        <button id="searchBtn">🔍 Extract Business Info</button>
        
        <div id="status" class="status info">Ready. Enter business name and click Extract.</div>
        
        <div class="small">💡 Your API key stays in your browser. Results appear below - copy for your bot.</div>
    </div>
    
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <span>📄 Results (Copy this for your bot)</span>
            <button id="copyBtn" style="width: auto; padding: 0.25rem 0.75rem; background: #3f3f46;">Copy</button>
        </div>
        <pre id="output">Results will appear here...</pre>
    </div>
</div>

<script>
    const apiKeyInput = document.getElementById('apiKey');
    const businessQuery = document.getElementById('businessQuery');
    const searchBtn = document.getElementById('searchBtn');
    const copyBtn = document.getElementById('copyBtn');
    const statusDiv = document.getElementById('status');
    const outputPre = document.getElementById('output');
    
    // Load saved key
    const savedKey = localStorage.getItem('anthropic_key');
    if (savedKey) {
        apiKeyInput.value = savedKey;
        statusDiv.innerHTML = '✅ API key loaded. Ready to search.';
        statusDiv.className = 'status success';
    }
    
    // Save key when typed
    apiKeyInput.addEventListener('change', () => {
        const key = apiKeyInput.value.trim();
        if (key && key.startsWith('sk-ant-')) {
            localStorage.setItem('anthropic_key', key);
            statusDiv.innerHTML = '✅ API key saved.';
            statusDiv.className = 'status success';
        }
    });
    
    // Default example
    businessQuery.value = `Monkey Adventures Tanzania - safari tour company in Arusha, Tanzania.

Please extract:
1. Business name
2. Website URL
3. Email address(es)
4. Phone number(s)
5. Physical address
6. Services offered (list)
7. Pricing (safari costs, Kilimanjaro trekking prices)
8. Business hours
9. Years in business
10. Social media links

Return as JSON only.`;
    
    copyBtn.onclick = () => {
        const text = outputPre.innerText;
        navigator.clipboard.writeText(text);
        copyBtn.innerText = '✅ Copied!';
        setTimeout(() => copyBtn.innerText = 'Copy', 2000);
    };
    
    searchBtn.onclick = async () => {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
            statusDiv.innerHTML = '❌ Please paste your Anthropic API key first.';
            statusDiv.className = 'status error';
            return;
        }
        
        if (!apiKey.startsWith('sk-ant-')) {
            statusDiv.innerHTML = '❌ Invalid API key format. Must start with sk-ant-';
            statusDiv.className = 'status error';
            return;
        }
        
        const query = businessQuery.value.trim();
        if (!query) {
            statusDiv.innerHTML = '❌ Enter business name and what info you need.';
            statusDiv.className = 'status error';
            return;
        }
        
        statusDiv.innerHTML = '⏳ Contacting Claude AI... This takes 20-30 seconds.';
        statusDiv.className = 'status info';
        outputPre.innerText = 'Searching for business information...';
        
        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'claude-3-sonnet-20241022',
                    max_tokens: 4000,
                    system: 'You are a business research assistant. Find accurate, real business information from your knowledge. Return ONLY valid JSON. Do not make up information - use "Not found" for missing fields.',
                    messages: [{
                        role: 'user',
                        content: `Research this business and return ONLY JSON:\n\n${query}\n\nReturn valid JSON only, no other text.`
                    }]
                })
            });
            
            if (!response.ok) {
                const error = await response.text();
                throw new Error(`API Error: ${response.status}`);
            }
            
            const data = await response.json();
            let result = data.content[0].text;
            
            // Extract JSON if wrapped in markdown
            const jsonMatch = result.match(/```json\s*([\s\S]*?)\s*```/);
            if (jsonMatch) {
                result = jsonMatch[1];
            }
            
            // Try to parse and prettify
            try {
                const parsed = JSON.parse(result);
                result = JSON.stringify(parsed, null, 2);
            } catch(e) {
                // Keep as is if not valid JSON
            }
            
            outputPre.innerText = result;
            statusDiv.innerHTML = '✅ Extraction complete! Copy the JSON above for your bot.';
            statusDiv.className = 'status success';
            
        } catch (error) {
            console.error('Error:', error);
            statusDiv.innerHTML = `❌ Error: ${error.message}. Make sure you have internet and your API key is correct.`;
            statusDiv.className = 'status error';
            outputPre.innerText = `Error: ${error.message}\n\nCheck your API key and try again.`;
        }
    };
</script>
</body>
</html>
